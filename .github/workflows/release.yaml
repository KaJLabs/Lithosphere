name: Developer Preview Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        type: boolean
        default: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  validate:
    name: Validate Preview Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      prerelease: ${{ steps.release_meta.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "Makalu/pnpm-lock.yaml"

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${VERSION}" == *-* ]]; then
              PRERELEASE=true
            else
              PRERELEASE=false
            fi
          fi

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)*$ ]]; then
            echo "Invalid release version: ${VERSION}"
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        working-directory: ./Makalu
        run: pnpm install --frozen-lockfile

      - name: Sync preview package versions
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          for (const file of [
            'Makalu/packages/create-litho-app/package.json',
            'Makalu/templates/sdk-template/package.json',
          ]) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            pkg.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          NODE

      - name: Typecheck public packages
        working-directory: ./Makalu
        run: |
          pnpm --filter create-litho-app typecheck
          pnpm --filter @lithosphere/sdk typecheck

      - name: Build CLI
        working-directory: ./Makalu
        run: pnpm --filter create-litho-app build

      - name: Build SDK
        working-directory: ./Makalu
        run: pnpm --filter @lithosphere/sdk build

      - name: Test SDK
        working-directory: ./Makalu
        run: pnpm --filter @lithosphere/sdk test

      - name: Compile canonical contracts
        working-directory: ./Makalu/contracts
        run: pnpm compile

  publish_github_release:
    name: Package And Publish Preview
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.validate.outputs.version }}
      RELEASE_TAG: ${{ needs.validate.outputs.tag }}
      RELEASE_PRERELEASE: ${{ needs.validate.outputs.prerelease }}
      ASSET_DIR: ${{ github.workspace }}/.release-assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "Makalu/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: ./Makalu
        run: pnpm install --frozen-lockfile

      - name: Sync preview package versions
        run: |
          node <<'NODE'
          const fs = require('fs');

          for (const file of [
            'Makalu/packages/create-litho-app/package.json',
            'Makalu/templates/sdk-template/package.json',
          ]) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            pkg.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          NODE

      - name: Prepare asset directory
        run: mkdir -p "${ASSET_DIR}"

      - name: Build CLI
        working-directory: ./Makalu
        run: pnpm --filter create-litho-app build

      - name: Build SDK
        working-directory: ./Makalu
        run: pnpm --filter @lithosphere/sdk build

      - name: Pack create-litho-app
        working-directory: ./Makalu/packages/create-litho-app
        run: npm pack --pack-destination "${ASSET_DIR}"

      - name: Pack @lithosphere/sdk
        working-directory: ./Makalu/templates/sdk-template
        run: npm pack --pack-destination "${ASSET_DIR}"

      - name: Smoke test packed CLI and SDK assets
        shell: bash
        run: |
          set -euo pipefail

          CLI_TARBALL="$(find "${ASSET_DIR}" -maxdepth 1 -name 'create-litho-app-*.tgz' -print -quit)"
          SDK_TARBALL="$(find "${ASSET_DIR}" -maxdepth 1 -name 'lithosphere-sdk-*.tgz' -print -quit)"

          if [[ -z "${CLI_TARBALL}" || -z "${SDK_TARBALL}" ]]; then
            echo "Packed tarballs were not generated as expected."
            exit 1
          fi

          CLI_INSTALL_DIR="${RUNNER_TEMP}/create-litho-app-install"
          SCAFFOLD_ROOT="${RUNNER_TEMP}/create-litho-app-smoke"
          SDK_CONSUMER_DIR="${RUNNER_TEMP}/sdk-consumer"

          mkdir -p "${CLI_INSTALL_DIR}" "${SCAFFOLD_ROOT}" "${SDK_CONSUMER_DIR}"

          npm install --prefix "${CLI_INSTALL_DIR}" "${CLI_TARBALL}"

          CLI_BIN="${CLI_INSTALL_DIR}/node_modules/.bin/create-litho-app"
          "${CLI_BIN}" preview-sdk --template sdk --directory "${SCAFFOLD_ROOT}"
          "${CLI_BIN}" preview-contracts --template contracts --directory "${SCAFFOLD_ROOT}"

          CONTRACT_PROJECT="${SCAFFOLD_ROOT}/preview-contracts"
          SDK_PROJECT="${SCAFFOLD_ROOT}/preview-sdk"

          for unexpected in artifacts cache dist node_modules typechain-types .turbo; do
            if [[ -e "${CONTRACT_PROJECT}/${unexpected}" ]]; then
              echo "Unexpected bundled artifact copied into the contracts template: ${unexpected}"
              exit 1
            fi
          done

          pnpm --dir "${SDK_PROJECT}" install --ignore-workspace
          pnpm --dir "${SDK_PROJECT}" build
          pnpm --dir "${SDK_PROJECT}" test

          pnpm --dir "${CONTRACT_PROJECT}" install --ignore-workspace
          pnpm --dir "${CONTRACT_PROJECT}" compile
          pnpm --dir "${CONTRACT_PROJECT}" test:hardhat

          cd "${SDK_CONSUMER_DIR}"
          npm init -y >/dev/null 2>&1
          pnpm add "${SDK_TARBALL}"
          node --input-type=module -e "import { createClient } from '@lithosphere/sdk'; if (typeof createClient !== 'function') throw new Error('SDK export check failed');"

      - name: Compile canonical contracts
        working-directory: ./Makalu/contracts
        run: pnpm compile

      - name: Bundle contract artifacts
        working-directory: ./Makalu/contracts
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE_NAME="lithosphere-contracts-v${RELEASE_VERSION}"
          BUNDLE_DIR="${ASSET_DIR}/${BUNDLE_NAME}"

          mkdir -p "${BUNDLE_DIR}/abi" "${BUNDLE_DIR}/bytecode" "${BUNDLE_DIR}/metadata"

          for artifact in artifacts/src/*.sol/*.json; do
            [[ -f "${artifact}" ]] || continue
            [[ "${artifact}" == *.dbg.json ]] && continue

            NAME="$(basename "${artifact}" .json)"

            node -e "const fs=require('fs'); const a=JSON.parse(fs.readFileSync('${artifact}','utf8')); fs.writeFileSync('${BUNDLE_DIR}/abi/${NAME}.abi.json', JSON.stringify(a.abi, null, 2));"
            node -e "const fs=require('fs'); const a=JSON.parse(fs.readFileSync('${artifact}','utf8')); fs.writeFileSync('${BUNDLE_DIR}/bytecode/${NAME}.bin', a.bytecode || '');"
            cp "${artifact}" "${BUNDLE_DIR}/metadata/${NAME}.json"
          done

          cat > "${BUNDLE_DIR}/manifest.json" <<EOF
          {
            "version": "${RELEASE_VERSION}",
            "tag": "${RELEASE_TAG}",
            "chain": "lithosphere_700777-1",
            "compiler": "solc",
            "commit": "${GITHUB_SHA}",
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          tar -czf "${ASSET_DIR}/${BUNDLE_NAME}.tar.gz" -C "${ASSET_DIR}" "${BUNDLE_NAME}"
          sha256sum "${ASSET_DIR}/${BUNDLE_NAME}.tar.gz" > "${ASSET_DIR}/${BUNDLE_NAME}.sha256"
          rm -rf "${BUNDLE_DIR}"

      - name: Generate release manifest
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const assetDir = process.env.ASSET_DIR;
          const releaseVersion = process.env.RELEASE_VERSION;
          const manifestPath = path.join(assetDir, `release-manifest-v${releaseVersion}.json`);
          const assetFiles = [
            `create-litho-app-${releaseVersion}.tgz`,
            `lithosphere-sdk-${releaseVersion}.tgz`,
            `lithosphere-contracts-v${releaseVersion}.tar.gz`,
            `lithosphere-contracts-v${releaseVersion}.sha256`,
            `release-manifest-v${releaseVersion}.json`,
            `checksums-v${releaseVersion}.txt`,
          ];

          const manifest = {
            version: releaseVersion,
            tag: process.env.RELEASE_TAG,
            prerelease: process.env.RELEASE_PRERELEASE === 'true',
            commit: process.env.GITHUB_SHA,
            generatedAt: new Date().toISOString(),
            nodeVersion: process.env.NODE_VERSION,
            pnpmVersion: process.env.PNPM_VERSION,
            assets: assetFiles,
          };

          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Generate checksums
        working-directory: ${{ env.ASSET_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          sha256sum \
            "create-litho-app-${RELEASE_VERSION}.tgz" \
            "lithosphere-sdk-${RELEASE_VERSION}.tgz" \
            "lithosphere-contracts-v${RELEASE_VERSION}.tar.gz" \
            "lithosphere-contracts-v${RELEASE_VERSION}.sha256" \
            "release-manifest-v${RELEASE_VERSION}.json" \
            > "checksums-v${RELEASE_VERSION}.txt"

      - name: Generate release notes
        shell: bash
        run: |
          cat > "${ASSET_DIR}/release-notes.md" <<EOF
          # Lithosphere Developer Preview ${RELEASE_TAG}

          This release is the first public GitHub developer preview for building on Lithosphere.

          ## Included Assets

          - \`create-litho-app-${RELEASE_VERSION}.tgz\`
          - \`lithosphere-sdk-${RELEASE_VERSION}.tgz\`
          - \`lithosphere-contracts-v${RELEASE_VERSION}.tar.gz\`
          - \`release-manifest-v${RELEASE_VERSION}.json\`
          - \`checksums-v${RELEASE_VERSION}.txt\`

          ## Quick Start

          1. Verify the assets with \`sha256sum -c checksums-v${RELEASE_VERSION}.txt\`.
          2. Install the CLI: \`npm install -g ./create-litho-app-${RELEASE_VERSION}.tgz\`.
          3. Scaffold a project: \`create-litho-app my-first-dapp --template contracts\`.

          There is no standalone \`lithic-compiler\` package in this preview yet. Smart contract development remains Solidity-first in this repository.
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: developer-preview-release-${{ env.RELEASE_VERSION }}
          path: |
            ${{ env.ASSET_DIR }}/*.tgz
            ${{ env.ASSET_DIR }}/lithosphere-contracts-v${{ env.RELEASE_VERSION }}.tar.gz
            ${{ env.ASSET_DIR }}/lithosphere-contracts-v${{ env.RELEASE_VERSION }}.sha256
            ${{ env.ASSET_DIR }}/release-manifest-v${{ env.RELEASE_VERSION }}.json
            ${{ env.ASSET_DIR }}/checksums-v${{ env.RELEASE_VERSION }}.txt
            ${{ env.ASSET_DIR }}/release-notes.md
          retention-days: 90

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Lithosphere Developer Preview ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ env.ASSET_DIR }}/release-notes.md
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          files: |
            ${{ env.ASSET_DIR }}/*.tgz
            ${{ env.ASSET_DIR }}/lithosphere-contracts-v${{ env.RELEASE_VERSION }}.tar.gz
            ${{ env.ASSET_DIR }}/lithosphere-contracts-v${{ env.RELEASE_VERSION }}.sha256
            ${{ env.ASSET_DIR }}/release-manifest-v${{ env.RELEASE_VERSION }}.json
            ${{ env.ASSET_DIR }}/checksums-v${{ env.RELEASE_VERSION }}.txt
