# ============================================================================
# Lithosphere Deployment Pipeline - Phase 4 (DEPRECATED)
# Replaced by deploy-simple.yaml which uses AWS SSM instead of SSH/bastion.
# Automatic triggers removed — manual dispatch only for emergency use.
# ============================================================================

name: Deploy (legacy SSH)

on:
  push:
    branches:
      - main
    paths:
      - 'Makalu/**'
      - '.github/workflows/deploy.yaml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - staging
          - mainnet
      skip_signature_check:
        description: 'Skip signature verification (emergency only)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kajlabs/lithosphere/service-template
  DEPLOY_PATH: /opt/lithosphere/Makalu
  SERVER_IP: ${{ secrets.SERVER_IP }}
  SERVER_USER: ${{ secrets.SERVER_USER }}

concurrency:
  group: deploy-${{ github.event_name == 'push' && 'mainnet' || github.event.inputs.environment || 'testnet' }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Verify SLSA Signatures
  # Ensures only cryptographically signed images are deployed
  # ─────────────────────────────────────────────────────────────────────────
  verify-signatures:
    name: Verify SLSA Signatures
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      verified: ${{ steps.verify.outputs.verified }}

    defaults:
      run:
        working-directory: ./Makalu

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Cosign Signatures
        id: verify
        if: ${{ github.event.inputs.skip_signature_check != 'true' }}
        run: |
          set +e
          
          # List of images to verify
          IMAGES=(
            "kajlabs/lithosphere-api"
            "kajlabs/lithosphere-indexer"
          )
          
          VERIFICATION_FAILED=false
          
          for IMAGE in "${IMAGES[@]}"; do
            echo ""
            echo "🔍 Verifying signature for: ${{ env.REGISTRY }}/${IMAGE}:latest"
            
            # Check if image exists
            if ! docker manifest inspect ${{ env.REGISTRY }}/${IMAGE}:latest >/dev/null 2>&1; then
              echo "⚠️  Warning: Image ${IMAGE}:latest not found in registry (will build locally)"
              continue
            fi
            
            # Verify the image signature using keyless signing (Fulcio + Rekor)
            cosign verify \
              --certificate-identity-regexp="https://github.com/KaJLabs/lithosphere/.*" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              ${{ env.REGISTRY }}/${IMAGE}:latest
            
            RESULT=$?
            
            if [ $RESULT -eq 0 ]; then
              echo "✅ Signature verification successful for ${IMAGE}"
            else
              echo "⚠️  Warning: Signature verification failed for ${IMAGE}"
              echo "   (Images built locally on VPS may not have signatures)"
            fi
          done
          
          echo "verified=true" >> $GITHUB_OUTPUT

      - name: Skip Signature Check (Emergency)
        if: ${{ github.event.inputs.skip_signature_check == 'true' }}
        run: |
          echo "::warning::⚠️ Signature verification skipped - Emergency deployment mode"
          echo "verified=skipped" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy to Target Environment
  # Push-based deployment via SSH
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event_name == 'push' && 'mainnet' || github.event.inputs.environment || 'testnet' }}
    runs-on: ubuntu-latest
    needs: verify-signatures
    if: |
      needs.verify-signatures.outputs.verified == 'true' || 
      needs.verify-signatures.outputs.verified == 'skipped'
    
    environment:
      name: ${{ github.event_name == 'push' && 'mainnet' || github.event.inputs.environment || 'testnet' }}
      url: ${{ steps.deploy.outputs.service_url }}

    permissions:
      contents: read
      packages: write
      id-token: write   # Required for OIDC → AWS role assumption

    defaults:
      run:
        working-directory: ./Makalu

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Working SSH Key
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          INDEXER_SSH_KEY: ${{ secrets.INDEXER_SSH_KEY }}
          BASTION_SSH_KEY: ${{ secrets.BASTION_SSH_KEY }}
        run: |
          MISSING=false
          [ -z "$SERVER_IP" ] && echo "SERVER_IP not set" && MISSING=true
          [ "$MISSING" = true ] && exit 1

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -T 10 -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

          CANDIDATE_USERS=()
          [ -n "$SERVER_USER" ] && CANDIDATE_USERS+=("$SERVER_USER")
          for candidate in ec2-user root ubuntu admin; do
            if [[ ! " ${CANDIDATE_USERS[*]} " =~ " ${candidate} " ]]; then
              CANDIDATE_USERS+=("$candidate")
            fi
          done

          test_auth() {
            local user_name="$1"
            local key_name="$2"
            local key_content="$3"
            local key_path

            [ -z "$key_content" ] && return 1

            key_path="$HOME/.ssh/${key_name}"
            printf '%s\n' "$key_content" > "$key_path"
            chmod 600 "$key_path"

            if ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no \
                -o IdentitiesOnly=yes -i "$key_path" "${user_name}@${SERVER_IP}" "exit 0" \
                >/dev/null 2>&1; then
              echo "SSH_KEY_PATH=$key_path" >> "$GITHUB_ENV"
              echo "DEPLOY_SSH_USER=$user_name" >> "$GITHUB_ENV"
              echo "Selected SSH key $key_name for user $user_name"
              return 0
            fi

            rm -f "$key_path"
            return 1
          }

          for user_name in "${CANDIDATE_USERS[@]}"; do
            test_auth "$user_name" "indexer_key" "$INDEXER_SSH_KEY" && exit 0
            test_auth "$user_name" "ssh_private_key" "$SSH_PRIVATE_KEY" && exit 0
            test_auth "$user_name" "vps_ssh_private_key" "$VPS_SSH_PRIVATE_KEY" && exit 0
            test_auth "$user_name" "bastion_key" "$BASTION_SSH_KEY" && exit 0
          done

          echo "No SSH user/key combination could authenticate to $SERVER_IP" >&2
          exit 1
      - name: Prepare Deployment Package
        id: prepare
        run: |
          # Create deployment directory
          mkdir -p deploy-package
          
          # Copy deployment files
          cp docker-compose.yaml deploy-package/
          cp .env.testnet deploy-package/.env 2>/dev/null || echo "No .env.testnet found, will use secrets"
          
          # Generate .env file from secrets if not present
          if [ ! -f deploy-package/.env ]; then
            cat > deploy-package/.env << 'ENVEOF'
          # Lithosphere Testnet Environment Configuration
          # Auto-generated by GitHub Actions deployment
          
          NODE_ENV=production
          ENVIRONMENT=${{ github.event_name == 'push' && 'mainnet' || github.event.inputs.environment || 'testnet' }}
          
          # API Configuration
          API_PORT=4000
          API_HOST=0.0.0.0
          
          # GraphQL Configuration
          GRAPHQL_PLAYGROUND=${{ (github.event_name != 'push' && github.event.inputs.environment == 'testnet') && 'true' || 'false' }}
          
          # Database Configuration
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          
          # Blockchain RPC Configuration
          LITHO_RPC_URL=${{ secrets.LITHO_RPC_URL }}
          LITHO_CHAIN_ID=${{ secrets.LITHO_CHAIN_ID }}
          
          # Indexer Configuration
          INDEXER_START_BLOCK=${{ secrets.INDEXER_START_BLOCK || '1' }}
          START_BLOCK=${{ secrets.INDEXER_START_BLOCK || '1' }}
          RPC_URL=${{ secrets.LITHO_RPC_URL }}
          EVM_RPC_URL=${{ secrets.EVM_RPC_URL }}
          INDEXER_BATCH_SIZE=100
          
          # Monitoring
          PROMETHEUS_ENABLED=true
          METRICS_PORT=9090
          
          # Container Registry
          IMAGE_TAG=${{ github.event_name == 'push' && 'mainnet' || github.event.inputs.environment || 'testnet' }}
          ENVEOF
          fi
          
          # Create deployment script
          cat > deploy-package/deploy.sh << 'DEPLOYEOF'
          #!/bin/bash
          set -euo pipefail
          
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/lithosphere/Makalu}"
          
          echo "🚀 Starting Lithosphere deployment..."
          
          cd "$DEPLOY_PATH"
          
          # Pull latest images
          echo "📦 Pulling latest images..."
          docker compose pull
          
          # Stop existing containers gracefully
          echo "🛑 Stopping existing services..."
          docker compose down --timeout 30 || true
          
          # Start services
          echo "🔄 Starting services..."
          docker compose up -d
          
          # Wait for services to be healthy
          echo "⏳ Waiting for services to become healthy..."
          sleep 10
          
          # Check service status
          docker compose ps
          
          echo "✅ Deployment complete!"
          DEPLOYEOF
          
          chmod +x deploy-package/deploy.sh
          
          echo "package_ready=true" >> $GITHUB_OUTPUT

      - name: Tag Image for Environment
        id: tag-image
        env:
          ENVIRONMENT: ${{ github.event_name == 'push' && 'mainnet' || github.event.inputs.environment || 'testnet' }}
        run: |
          echo "📦 Tagging images for ${ENVIRONMENT} environment..."
          
          # Log in to registry
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          
          # Timestamp for version tracking
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          # List of actual service images being used
          IMAGES=(
            "kajlabs/lithosphere-api"
            "kajlabs/lithosphere-indexer"
          )
          
          for IMAGE in "${IMAGES[@]}"; do
            echo ""
            echo "🏷️  Tagging ${IMAGE}..."
            
            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${IMAGE}:latest || {
              echo "⚠️  Warning: Could not pull ${IMAGE}:latest (may not exist yet)"
              continue
            }
            
            # Tag with environment-specific tag
            docker tag \
              ${{ env.REGISTRY }}/${IMAGE}:latest \
              ${{ env.REGISTRY }}/${IMAGE}:${ENVIRONMENT}
            
            # Tag with timestamp for version tracking
            docker tag \
              ${{ env.REGISTRY }}/${IMAGE}:latest \
              ${{ env.REGISTRY }}/${IMAGE}:${ENVIRONMENT}-${TIMESTAMP}
            
            # Push environment-specific tags
            docker push ${{ env.REGISTRY }}/${IMAGE}:${ENVIRONMENT}
            docker push ${{ env.REGISTRY }}/${IMAGE}:${ENVIRONMENT}-${TIMESTAMP}
            
            echo "✅ Tagged ${IMAGE} as:"
            echo "  - ${ENVIRONMENT}"
            echo "  - ${ENVIRONMENT}-${TIMESTAMP}"
          done
          
          echo ""
          echo "image_tag=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "image_tag_timestamp=${ENVIRONMENT}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        id: deploy
        run: |
          echo "Deploying to $SERVER_IP..."
          ENV="${{ github.event_name == 'push' && 'mainnet' || github.event.inputs.environment || 'testnet' }}"

          ssh -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              -i "$SSH_KEY_PATH" \
              "$DEPLOY_SSH_USER@$SERVER_IP" << ENDSSH
            set -e
            sudo mkdir -p /opt/lithosphere
            sudo chown "\$USER:\$USER" /opt/lithosphere
            cd /opt/lithosphere

            if [ ! -d lithosphere ]; then
              git clone https://github.com/KaJLabs/lithosphere.git
            else
              cd lithosphere && git fetch origin && git reset --hard origin/main && cd ..
            fi

            if [ -f Makalu/.env ]; then
              cp Makalu/.env /tmp/.env.preserve
              echo "Preserved existing server .env"
            fi

            mkdir -p Makalu
            cp -r lithosphere/Makalu/. Makalu/
            rm -rf lithosphere

            cd Makalu
            if [ -f /tmp/.env.preserve ]; then
              cp /tmp/.env.preserve .env
              rm -f /tmp/.env.preserve
              echo "Restored existing server .env"
            elif [ -f ".env.${ENV}" ]; then
              cp ".env.${ENV}" .env
              echo "Using .env.${ENV}"
            elif [ ! -f .env ]; then
              cp .env.mainnet .env
              echo "Fallback: using .env.mainnet"
            fi

            sudo docker compose up -d --build --remove-orphans
          ENDSSH

          echo "service_url=https://makalu.litho.ai" >> $GITHUB_OUTPUT
          echo "Deployed to $SERVER_IP"

      - name: Cleanup Old Docker Images
        run: |
          echo "Cleaning up old Docker images on server..."

          ssh -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              -i "$SSH_KEY_PATH" \
              "$DEPLOY_SSH_USER@$SERVER_IP" << 'CLEANUP_SCRIPT'
          set -euo pipefail

          echo "Disk usage BEFORE cleanup:"
          df -h /var/lib/docker 2>/dev/null || df -h /
          echo ""

          echo "Removing dangling images..."
          DANGLING=$(docker image prune -f 2>&1 | grep -oP 'Total reclaimed space: \K.*' || echo "0B")
          echo "  Reclaimed: ${DANGLING}"

          echo "Removing images older than 7 days..."
          OLD_IMAGES=$(docker image prune -a --filter "until=168h" -f 2>&1 | grep -oP 'Total reclaimed space: \K.*' || echo "0B")
          echo "  Reclaimed: ${OLD_IMAGES}"

          echo "Removing unused volumes..."
          VOLUMES=$(docker volume prune -f 2>&1 | grep -oP 'Total reclaimed space: \K.*' || echo "0B")
          echo "  Reclaimed: ${VOLUMES}"

          echo "Pruning build cache..."
          BUILD_CACHE=$(docker builder prune -a --filter "until=24h" -f 2>&1 | grep -oP 'Total reclaimed space: \K.*' || echo "0B")
          echo "  Reclaimed: ${BUILD_CACHE}"

          echo ""
          echo "Disk usage AFTER cleanup:"
          df -h /var/lib/docker 2>/dev/null || df -h /

          echo ""
          echo "Current Docker images:"
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}" | head -10 || true

          echo ""
          echo "Cleanup complete!"
          CLEANUP_SCRIPT

          echo "cleanup_status=success" >> $GITHUB_OUTPUT
      - name: Generate Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event_name == 'push' && 'mainnet' || github.event.inputs.environment || 'testnet' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Images | API, Indexer |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ steps.tag-image.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API Image | \`${{ env.REGISTRY }}/kajlabs/lithosphere-api:${{ steps.tag-image.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Indexer Image | \`${{ env.REGISTRY }}/kajlabs/lithosphere-indexer:${{ steps.tag-image.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed At | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Health Check Verification
  # Verify all services are running correctly post-deployment
  # ─────────────────────────────────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy

    env:
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Select Working SSH Key
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          INDEXER_SSH_KEY: ${{ secrets.INDEXER_SSH_KEY }}
          BASTION_SSH_KEY: ${{ secrets.BASTION_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -T 10 -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

          CANDIDATE_USERS=()
          [ -n "$SERVER_USER" ] && CANDIDATE_USERS+=("$SERVER_USER")
          for candidate in ec2-user root ubuntu admin; do
            if [[ ! " ${CANDIDATE_USERS[*]} " =~ " ${candidate} " ]]; then
              CANDIDATE_USERS+=("$candidate")
            fi
          done

          test_auth() {
            local user_name="$1"
            local key_name="$2"
            local key_content="$3"
            local key_path

            [ -z "$key_content" ] && return 1

            key_path="$HOME/.ssh/${key_name}"
            printf '%s\n' "$key_content" > "$key_path"
            chmod 600 "$key_path"

            if ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no \
                -o IdentitiesOnly=yes -i "$key_path" "${user_name}@${SERVER_IP}" "exit 0" \
                >/dev/null 2>&1; then
              echo "SSH_KEY_PATH=$key_path" >> "$GITHUB_ENV"
              echo "DEPLOY_SSH_USER=$user_name" >> "$GITHUB_ENV"
              echo "Selected SSH key $key_name for user $user_name"
              return 0
            fi

            rm -f "$key_path"
            return 1
          }

          for user_name in "${CANDIDATE_USERS[@]}"; do
            test_auth "$user_name" "indexer_key" "$INDEXER_SSH_KEY" && exit 0
            test_auth "$user_name" "ssh_private_key" "$SSH_PRIVATE_KEY" && exit 0
            test_auth "$user_name" "vps_ssh_private_key" "$VPS_SSH_PRIVATE_KEY" && exit 0
            test_auth "$user_name" "bastion_key" "$BASTION_SSH_KEY" && exit 0
          done

          echo "No SSH user/key combination could authenticate to $SERVER_IP" >&2
          exit 1

      - name: Wait for Services to Stabilize
        run: sleep 30

      - name: Health Check - API Service
        id: api-health
        run: |
          if ssh -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              -i "$SSH_KEY_PATH" \
              "$DEPLOY_SSH_USER@$SERVER_IP" << 'ENDSSH'
            MAX_RETRIES=5
            RETRY_DELAY=10
            for i in $(seq 1 $MAX_RETRIES); do
              echo "Attempt $i: checking API..."
              HTTP_CODE=$(curl -s -o /tmp/api-health.txt -w "%{http_code}" --connect-timeout 10 --max-time 30 \
                http://localhost:4000/health || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "API healthy"
                cat /tmp/api-health.txt
                exit 0
              fi
              echo "HTTP $HTTP_CODE"
              [ $i -lt $MAX_RETRIES ] && sleep $RETRY_DELAY
            done
            exit 1
          ENDSSH
          then
            echo "api_status=healthy" >> $GITHUB_OUTPUT
          else
            echo "api_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Health Check - GraphQL Endpoint
        id: graphql-health
        run: |
          HTTP_CODE=$(ssh -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              -i "$SSH_KEY_PATH" \
              "$DEPLOY_SSH_USER@$SERVER_IP" \
              "curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d '{\"query\":\"{ __typename }\"}' http://localhost:4000/graphql || true")
          if echo "$HTTP_CODE" | grep -qE '^2'; then
            echo "GraphQL healthy"
            echo "graphql_status=healthy" >> $GITHUB_OUTPUT
          else
            echo "::warning::GraphQL degraded"
            echo "graphql_status=degraded" >> $GITHUB_OUTPUT
          fi

      - name: Health Check - Metrics Endpoint
        id: metrics-health
        run: |
          HTTP_CODE=$(ssh -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              -i "$SSH_KEY_PATH" \
              "$DEPLOY_SSH_USER@$SERVER_IP" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:9090/metrics || true")
          if echo "$HTTP_CODE" | grep -qE '^2'; then
            echo "Metrics healthy"
            echo "metrics_status=healthy" >> $GITHUB_OUTPUT
          else
            echo "::warning::Metrics unavailable"
            echo "metrics_status=unavailable" >> $GITHUB_OUTPUT
          fi

      - name: Generate Health Report
        if: always()
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API (/health) | ${{ steps.api-health.outputs.api_status || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GraphQL (/graphql) | ${{ steps.graphql-health.outputs.graphql_status || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Metrics (/metrics) | ${{ steps.metrics-health.outputs.metrics_status || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY

  # Job 4: Rollback on Failure
  # Automatically rollback if health checks fail
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: failure() && needs.deploy.result == 'success'

    env:
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Select Working SSH Key
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          INDEXER_SSH_KEY: ${{ secrets.INDEXER_SSH_KEY }}
          BASTION_SSH_KEY: ${{ secrets.BASTION_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -T 10 -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

          CANDIDATE_USERS=()
          [ -n "$SERVER_USER" ] && CANDIDATE_USERS+=("$SERVER_USER")
          for candidate in ec2-user root ubuntu admin; do
            if [[ ! " ${CANDIDATE_USERS[*]} " =~ " ${candidate} " ]]; then
              CANDIDATE_USERS+=("$candidate")
            fi
          done

          test_auth() {
            local user_name="$1"
            local key_name="$2"
            local key_content="$3"
            local key_path

            [ -z "$key_content" ] && return 1

            key_path="$HOME/.ssh/${key_name}"
            printf '%s\n' "$key_content" > "$key_path"
            chmod 600 "$key_path"

            if ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no \
                -o IdentitiesOnly=yes -i "$key_path" "${user_name}@${SERVER_IP}" "exit 0" \
                >/dev/null 2>&1; then
              echo "SSH_KEY_PATH=$key_path" >> "$GITHUB_ENV"
              echo "DEPLOY_SSH_USER=$user_name" >> "$GITHUB_ENV"
              echo "Selected SSH key $key_name for user $user_name"
              return 0
            fi

            rm -f "$key_path"
            return 1
          }

          for user_name in "${CANDIDATE_USERS[@]}"; do
            test_auth "$user_name" "indexer_key" "$INDEXER_SSH_KEY" && exit 0
            test_auth "$user_name" "ssh_private_key" "$SSH_PRIVATE_KEY" && exit 0
            test_auth "$user_name" "vps_ssh_private_key" "$VPS_SSH_PRIVATE_KEY" && exit 0
            test_auth "$user_name" "bastion_key" "$BASTION_SSH_KEY" && exit 0
          done

          echo "No SSH user/key combination could authenticate to $SERVER_IP" >&2
          exit 1

      - name: Rollback Deployment
        run: |
          echo "Initiating rollback..."
          ssh -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              -i "$SSH_KEY_PATH" \
              "$DEPLOY_SSH_USER@$SERVER_IP" << 'ENDSSH'
            cd /opt/lithosphere/Makalu
            if [ -f docker-compose.yaml.bak ]; then
              echo "Restoring previous configuration..."
              mv docker-compose.yaml.bak docker-compose.yaml
              sudo docker compose up -d --remove-orphans
              echo "Rollback complete"
            else
              echo "::warning::No backup found, stopping services"
              sudo docker compose down
            fi
          ENDSSH

      - name: Notify Rollback
        run: |
          echo "## Deployment Rolled Back" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deployment was rolled back due to failed health checks." >> $GITHUB_STEP_SUMMARY
          echo "Please investigate the logs and retry deployment." >> $GITHUB_STEP_SUMMARY
