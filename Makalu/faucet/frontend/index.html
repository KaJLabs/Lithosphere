<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lithosphere Faucet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 2rem;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p {
      color: #888;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .card {
      background: #16161e;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #aaa;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #6366f1;
    }
    input[type="text"]::placeholder {
      color: #555;
    }
    select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }
    select:focus {
      border-color: #6366f1;
    }
    button {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .result.success {
      display: block;
      background: #0d2818;
      border: 1px solid #1a5c2e;
      color: #4ade80;
    }
    .result.error {
      display: block;
      background: #2d1216;
      border: 1px solid #5c1a22;
      color: #f87171;
    }
    .result .tx-hash {
      word-break: break-all;
      margin-top: 0.5rem;
      color: #93c5fd;
    }
    .info {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      line-height: 1.6;
    }
    .info span { color: #8b5cf6; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Lithosphere Faucet</h1>
      <p>Request configured testnet assets for the Makalu network</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label for="address">Wallet Address</label>
        <input
          type="text"
          id="address"
          placeholder="0x..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="form-group">
        <label for="asset">Asset</label>
        <select id="asset"></select>
      </div>

      <div class="form-group">
        <label for="amount">Amount</label>
        <select id="amount"></select>
      </div>

      <button id="drip-btn" onclick="requestDrip()">
        Request Test Tokens
      </button>

      <div id="result" class="result"></div>

      <div class="info">
        <p>Selected asset: <span id="selected-asset">LITHO</span></p>
        <p>Available amounts: <span id="available-amounts">1 / 2 / 5 LITHO</span></p>
        <p>Default amount: <span id="drip-amount">1 LITHO</span></p>
        <p>Cooldown: <span id="cooldown">24 hours</span> per address and asset</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const FALLBACK_ASSETS = [
      {
        id: 'litho',
        name: 'Lithosphere',
        symbol: 'LITHO',
        kind: 'native',
        allowedAmounts: ['1', '2', '5'],
        defaultAmount: '1',
      },
    ];

    let faucetAssets = FALLBACK_ASSETS;

    function normalizeAssets(rawAssets) {
      if (!Array.isArray(rawAssets) || rawAssets.length === 0) {
        return FALLBACK_ASSETS;
      }

      return rawAssets
        .map((asset) => {
          const symbol = typeof asset.symbol === 'string' && asset.symbol ? asset.symbol : 'TOKEN';
          const allowedAmounts = Array.isArray(asset.allowedAmounts) && asset.allowedAmounts.length
            ? asset.allowedAmounts.map((value) => String(value))
            : (asset.kind === 'native' ? ['1', '2', '5'] : ['10', '25', '50']);
          const defaultAmount =
            typeof asset.defaultAmount === 'string' && allowedAmounts.includes(asset.defaultAmount)
              ? asset.defaultAmount
              : allowedAmounts[0];

          return {
            id: String(asset.id || symbol.toLowerCase()),
            name: typeof asset.name === 'string' && asset.name ? asset.name : symbol,
            symbol,
            kind: asset.kind === 'erc20' ? 'erc20' : 'native',
            standard: typeof asset.standard === 'string' ? asset.standard : (asset.kind === 'erc20' ? 'LEP-100' : 'native'),
            allowedAmounts,
            defaultAmount,
          };
        })
        .filter((asset) => asset.id && asset.symbol);
    }

    function getSelectedAsset() {
      const assetInput = document.getElementById('asset');
      return faucetAssets.find((asset) => asset.id === assetInput.value) || faucetAssets[0];
    }

    function renderAssetOptions(assets, selectedAssetId) {
      const assetSelect = document.getElementById('asset');
      assetSelect.innerHTML = '';

      assets.forEach((asset) => {
        const option = document.createElement('option');
        option.value = asset.id;
        option.textContent = asset.kind === 'native'
          ? `${asset.symbol} (Native)`
          : `${asset.symbol} (${asset.standard || 'LEP-100'})`;
        option.selected = asset.id === selectedAssetId;
        assetSelect.appendChild(option);
      });
    }

    function renderAmountOptions(asset, selectedAmount) {
      const amountSelect = document.getElementById('amount');
      amountSelect.innerHTML = '';

      asset.allowedAmounts.forEach((amount) => {
        const option = document.createElement('option');
        option.value = amount;
        option.textContent = `${amount} ${asset.symbol}`;
        option.selected = amount === selectedAmount;
        amountSelect.appendChild(option);
      });
    }

    function updateAssetInfo(asset) {
      document.getElementById('selected-asset').textContent =
        `${asset.name} (${asset.symbol})`;
      document.getElementById('available-amounts').textContent =
        asset.allowedAmounts.map((amount) => `${amount} ${asset.symbol}`).join(' / ');
      document.getElementById('drip-amount').textContent =
        `${asset.defaultAmount} ${asset.symbol}`;
    }

    async function requestDrip() {
      const addressInput = document.getElementById('address');
      const assetInput = document.getElementById('asset');
      const amountInput = document.getElementById('amount');
      const btn = document.getElementById('drip-btn');
      const result = document.getElementById('result');
      const address = addressInput.value.trim();
      const assetId = assetInput.value;
      const amount = amountInput.value;

      if (!address || !address.match(/^0x[a-fA-F0-9]{40}$/)) {
        result.className = 'result error';
        result.innerHTML = 'Please enter a valid Ethereum address (0x...)';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Sending...';
      result.style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/drip`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, assetId, amount }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          result.className = 'result success';
          result.innerHTML = `Sent ${data.amount} to ${address}<div class="tx-hash">TX: ${data.txHash}</div>`;
        } else {
          result.className = 'result error';
          result.innerHTML = data.message || 'Request failed';
        }
      } catch (err) {
        result.className = 'result error';
        result.innerHTML = 'Network error. Is the faucet server running?';
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Request Test Tokens';
      }
    }

    document.getElementById('address').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') requestDrip();
    });

    document.getElementById('asset').addEventListener('change', () => {
      const asset = getSelectedAsset();
      renderAmountOptions(asset, asset.defaultAmount);
      updateAssetInfo(asset);
    });

    fetch(`${API_BASE}/health`)
      .then((r) => r.json())
      .then((data) => {
        faucetAssets = normalizeAssets(data.assets);
        const defaultAssetId = typeof data.defaultAssetId === 'string' &&
          faucetAssets.some((asset) => asset.id === data.defaultAssetId)
          ? data.defaultAssetId
          : faucetAssets[0].id;
        const activeAsset = faucetAssets.find((asset) => asset.id === defaultAssetId) || faucetAssets[0];

        renderAssetOptions(faucetAssets, activeAsset.id);
        renderAmountOptions(activeAsset, activeAsset.defaultAmount);
        updateAssetInfo(activeAsset);
        document.getElementById('cooldown').textContent = `${data.cooldownHours || 24} hours`;
      })
      .catch(() => {
        renderAssetOptions(faucetAssets, faucetAssets[0].id);
        renderAmountOptions(faucetAssets[0], faucetAssets[0].defaultAmount);
        updateAssetInfo(faucetAssets[0]);
      });
  </script>
</body>
</html>
